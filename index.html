<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dart Scorer</title>
  
  <!-- Memuat React dan Tailwind langsung dari Internet -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Kumpulan Ikon (Pengganti lucide-react agar tidak perlu install npm) ---
    const TargetIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
    );
    const UsersIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    );
    const PlusIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    );
    const XIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    );
    const ArrowRightIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    );
    const RotateCcwIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
    );
    const TrophyIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
    );

    function App() {
      const [gameState, setGameState] = useState('setup');
      const [startingScore, setStartingScore] = useState(501);
      const [players, setPlayers] = useState([]);
      const [newPlayerName, setNewPlayerName] = useState('');
      const [currentPlayerIndex, setCurrentPlayerIndex] = useState(0);
      
      // State baru untuk 3 dart terpisah
      const [dart1, setDart1] = useState('');
      const [dart2, setDart2] = useState('');
      const [dart3, setDart3] = useState('');
      
      const [winner, setWinner] = useState(null);
      const [errorMsg, setErrorMsg] = useState('');

      const inputRef = useRef(null);

      useEffect(() => {
        if (gameState === 'playing' && inputRef.current) {
          inputRef.current.focus();
        }
      }, [gameState, currentPlayerIndex]);

      const handleAddPlayer = (e) => {
        e.preventDefault();
        if (newPlayerName.trim() === '') return;
        setPlayers([...players, { 
          id: Date.now(), 
          name: newPlayerName.trim(), 
          score: startingScore,
          history: []
        }]);
        setNewPlayerName('');
      };

      const handleRemovePlayer = (id) => {
        setPlayers(players.filter(p => p.id !== id));
      };

      const startGame = () => {
        if (players.length < 1) {
          setErrorMsg('Tambahkan minimal 1 pemain!');
          return;
        }
        setErrorMsg('');
        setPlayers(players.map(p => ({ ...p, score: startingScore, history: [] })));
        setCurrentPlayerIndex(0);
        setGameState('playing');
        setWinner(null);
        setDart1('');
        setDart2('');
        setDart3('');
      };

      const handleScoreSubmit = (e) => {
        e.preventDefault();
        setErrorMsg('');
        
        const d1 = parseInt(dart1) || 0;
        const d2 = parseInt(dart2) || 0;
        const d3 = parseInt(dart3) || 0;

        if (dart1 === '' && dart2 === '' && dart3 === '') {
          setErrorMsg('Masukkan minimal 1 skor dart!');
          return;
        }

        const points = d1 + d2 + d3;
        
        if (points < 0 || points > 180) {
          setErrorMsg('Total skor per giliran maksimal 180 dan minimal 0.');
          return;
        }

        const currentPlayer = players[currentPlayerIndex];
        const newScore = currentPlayer.score - points;

        let updatedPlayers = [...players];
        let isBust = false;

        if (newScore < 0) {
          isBust = true;
          setErrorMsg('Bust! Skor melebihi batas.');
        }

        if (isBust) {
          updatedPlayers[currentPlayerIndex] = {
            ...currentPlayer,
            history: [...currentPlayer.history, { points, type: 'bust' }]
          };
        } else {
          updatedPlayers[currentPlayerIndex] = {
            ...currentPlayer,
            score: newScore,
            history: [...currentPlayer.history, { points, type: 'hit' }]
          };
        }

        setPlayers(updatedPlayers);
        setDart1('');
        setDart2('');
        setDart3('');

        if (newScore === 0) {
          setWinner(currentPlayer);
          setGameState('finished');
        } else {
          setCurrentPlayerIndex((currentPlayerIndex + 1) % players.length);
        }
      };

      const handleQuickScore = (val) => {
        if (val === 180) {
          setDart1('60');
          setDart2('60');
          setDart3('60');
        } else if (val === 0) {
          setDart1('0');
          setDart2('0');
          setDart3('0');
        } else {
          // Jika pakai tombol cepat total, masukkan ke dart 1 dan kosongkan sisanya
          setDart1(val.toString());
          setDart2('');
          setDart3('');
        }
      };

      const resetGame = () => {
        setGameState('setup');
        setWinner(null);
        setPlayers([]);
        setStartingScore(501);
      };

      const playRematch = () => {
        setPlayers(players.map(p => ({ ...p, score: startingScore, history: [] })));
        setCurrentPlayerIndex(0);
        setGameState('playing');
        setWinner(null);
        setDart1('');
        setDart2('');
        setDart3('');
      };

      // Hitung total poin secara real-time untuk ditampilkan
      const currentTotal = (parseInt(dart1) || 0) + (parseInt(dart2) || 0) + (parseInt(dart3) || 0);

      return (
        <div className="min-h-screen p-4 md:p-8">
          <div className="max-w-4xl mx-auto">
            
            {/* HEADER */}
            <header className="flex items-center justify-center mb-8 space-x-3 text-slate-900">
              <TargetIcon className="w-8 h-8 text-red-500" />
              <h1 className="text-3xl font-bold tracking-tight">Dart Scorer</h1>
            </header>

            {/* SETUP SCREEN */}
            {gameState === 'setup' && (
              <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200">
                <h2 className="text-xl font-semibold mb-6 flex items-center">
                  <UsersIcon className="w-5 h-5 mr-2 text-blue-500" /> Pengaturan Permainan
                </h2>
                
                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                  <div>
                    <label className="block text-sm font-medium text-slate-600 mb-2">Skor Awal</label>
                    <div className="flex space-x-3">
                      {[301, 501, 701].map(score => (
                        <button
                          key={score}
                          onClick={() => setStartingScore(score)}
                          className={`flex-1 py-3 rounded-lg font-bold border transition-all ${
                            startingScore === score 
                              ? 'bg-blue-600 text-white border-blue-600 shadow-md' 
                              : 'bg-slate-50 text-slate-700 border-slate-300 hover:bg-slate-100'
                          }`}
                        >
                          {score}
                        </button>
                      ))}
                    </div>
                  </div>

                  <div>
                    <label className="block text-sm font-medium text-slate-600 mb-2">Tambah Pemain</label>
                    <form onSubmit={handleAddPlayer} className="flex space-x-2 mb-4">
                      <input
                        type="text"
                        placeholder="Nama Pemain..."
                        value={newPlayerName}
                        onChange={(e) => setNewPlayerName(e.target.value)}
                        className="flex-1 px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                      />
                      <button 
                        type="submit"
                        className="px-4 py-2 bg-slate-800 text-white rounded-lg hover:bg-slate-700 transition-colors flex items-center justify-center"
                      >
                        <PlusIcon className="w-5 h-5" />
                      </button>
                    </form>

                    <div className="space-y-2">
                      {players.map(player => (
                        <div key={player.id} className="flex justify-between items-center bg-slate-50 px-4 py-3 rounded-lg border border-slate-100">
                          <span className="font-medium text-slate-700">{player.name}</span>
                          <button 
                            onClick={() => handleRemovePlayer(player.id)}
                            className="text-red-400 hover:text-red-600 transition-colors"
                          >
                            <XIcon className="w-5 h-5" />
                          </button>
                        </div>
                      ))}
                      {players.length === 0 && (
                        <p className="text-sm text-slate-400 italic text-center py-2">Belum ada pemain yang ditambahkan.</p>
                      )}
                    </div>
                  </div>
                </div>

                {errorMsg && <p className="text-red-500 mt-4 text-center font-medium bg-red-50 p-3 rounded-lg">{errorMsg}</p>}

                <div className="mt-8 pt-6 border-t border-slate-100 text-center">
                  <button
                    onClick={startGame}
                    disabled={players.length === 0}
                    className={`w-full md:w-auto px-8 py-3 rounded-xl font-bold text-lg transition-all ${
                      players.length > 0 
                        ? 'bg-green-500 text-white hover:bg-green-600 shadow-lg' 
                        : 'bg-slate-200 text-slate-400 cursor-not-allowed'
                    }`}
                  >
                    Mulai Permainan
                  </button>
                </div>
              </div>
            )}

            {/* GAME SCREEN */}
            {gameState === 'playing' && (
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                
                <div className="lg:col-span-1 bg-white p-6 rounded-2xl shadow-sm border border-slate-200 order-2 lg:order-1 flex flex-col">
                  <h3 className="text-lg font-semibold text-slate-700 mb-4 flex items-center">
                    Giliran: <span className="ml-2 text-blue-600 font-bold">{players[currentPlayerIndex].name}</span>
                  </h3>
                  
                  <form onSubmit={handleScoreSubmit} className="flex flex-col flex-1">
                    <label className="text-sm font-medium text-slate-500 mb-2">Masukkan Skor Tiap Dart (1-3):</label>
                    
                    <div className="flex gap-2 mb-2">
                      <input
                        ref={inputRef}
                        type="number"
                        min="0"
                        max="180"
                        value={dart1}
                        onChange={(e) => setDart1(e.target.value)}
                        className="w-1/3 text-center text-2xl md:text-3xl font-bold py-4 border-2 border-slate-300 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition-all"
                        placeholder="D1"
                      />
                      <input
                        type="number"
                        min="0"
                        max="180"
                        value={dart2}
                        onChange={(e) => setDart2(e.target.value)}
                        className="w-1/3 text-center text-2xl md:text-3xl font-bold py-4 border-2 border-slate-300 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition-all"
                        placeholder="D2"
                      />
                      <input
                        type="number"
                        min="0"
                        max="180"
                        value={dart3}
                        onChange={(e) => setDart3(e.target.value)}
                        className="w-1/3 text-center text-2xl md:text-3xl font-bold py-4 border-2 border-slate-300 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition-all"
                        placeholder="D3"
                      />
                    </div>
                    
                    <div className="text-center bg-slate-50 rounded-lg py-3 mb-4 border border-slate-200 flex items-center justify-center">
                      <span className="text-sm font-semibold text-slate-500 uppercase tracking-wider">Total Lemparan: </span>
                      <span className="text-3xl font-black text-blue-600 ml-2">{currentTotal}</span>
                    </div>
                    
                    <div className="grid grid-cols-4 gap-2 mb-6">
                      {[26, 41, 45, 60, 81, 85, 100, 140].map(val => (
                        <button
                          key={val}
                          type="button"
                          onClick={() => handleQuickScore(val)}
                          className="bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-2 rounded-lg transition-colors"
                        >
                          {val}
                        </button>
                      ))}
                      <button type="button" onClick={() => handleQuickScore(0)} className="col-span-2 bg-slate-200 hover:bg-slate-300 text-slate-800 font-bold py-2 rounded-lg">Miss (0)</button>
                      <button type="button" onClick={() => handleQuickScore(180)} className="col-span-2 bg-red-100 hover:bg-red-200 text-red-700 font-bold py-2 rounded-lg">180!</button>
                    </div>

                    {errorMsg && <p className="text-red-500 mb-4 text-center font-medium animate-pulse">{errorMsg}</p>}

                    <div className="mt-auto flex flex-col gap-3">
                       <button
                        type="submit"
                        className="w-full bg-blue-600 text-white font-bold text-xl py-4 rounded-xl hover:bg-blue-700 shadow-lg transition-all flex justify-center items-center"
                      >
                        Input Skor <ArrowRightIcon className="ml-2 w-6 h-6" />
                      </button>
                      <div className="flex gap-2">
                        <button
                          type="button"
                          onClick={playRematch}
                          className="flex-1 bg-slate-100 text-slate-700 font-semibold py-3 rounded-xl hover:bg-slate-200 transition-all flex justify-center items-center text-sm"
                        >
                          <RotateCcwIcon className="w-4 h-4 mr-2" /> Ulangi Match
                        </button>
                        <button
                          type="button"
                          onClick={resetGame}
                          className="flex-1 bg-slate-100 text-red-600 font-semibold py-3 rounded-xl hover:bg-red-50 transition-all flex justify-center items-center text-sm"
                        >
                          <UsersIcon className="w-4 h-4 mr-2" /> Ganti Pemain
                        </button>
                      </div>
                    </div>
                  </form>
                </div>

                <div className="lg:col-span-2 grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4 order-1 lg:order-2">
                  {players.map((player, idx) => (
                    <div 
                      key={player.id} 
                      className={`relative p-5 rounded-2xl border-2 transition-all flex flex-col h-full ${
                        idx === currentPlayerIndex 
                          ? 'bg-blue-50 border-blue-500 shadow-md ring-4 ring-blue-100 scale-[1.02]' 
                          : 'bg-white border-slate-200 opacity-80'
                      }`}
                    >
                      {idx === currentPlayerIndex && (
                        <div className="absolute -top-3 left-1/2 transform -translate-x-1/2 bg-blue-500 text-white text-xs font-bold px-3 py-1 rounded-full shadow-sm">
                          Aktif
                        </div>
                      )}
                      <h3 className="text-lg font-bold text-slate-700 text-center truncate">{player.name}</h3>
                      <div className="text-center my-4">
                        <span className={`text-6xl font-black ${
                          player.score <= 50 ? 'text-red-500' : 
                          player.score <= 100 ? 'text-orange-500' : 'text-slate-800'
                        }`}>
                          {player.score}
                        </span>
                      </div>
                      
                      <div className="mt-auto bg-slate-50 rounded-lg p-3 max-h-32 overflow-y-auto border border-slate-100">
                        <p className="text-xs font-semibold text-slate-500 mb-2 uppercase tracking-wider">Riwayat Lemparan</p>
                        {player.history.length === 0 ? (
                          <p className="text-sm text-slate-400 italic">Belum ada lemparan.</p>
                        ) : (
                          <div className="flex flex-col gap-1">
                            {player.history.slice().reverse().map((hist, hIdx) => (
                              <div key={hIdx} className={`flex justify-between text-sm ${hist.type === 'bust' ? 'text-red-500 font-medium' : 'text-slate-600'}`}>
                                <span>Ronde {player.history.length - hIdx}</span>
                                <span>{hist.type === 'bust' ? 'Bust!' : `-${hist.points}`}</span>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* WINNER SCREEN */}
            {gameState === 'finished' && (
              <div className="bg-white p-8 md:p-12 rounded-3xl shadow-xl border border-yellow-200 text-center max-w-2xl mx-auto">
                <TrophyIcon className="w-24 h-24 text-yellow-400 mx-auto mb-6 drop-shadow-lg" />
                <h2 className="text-4xl font-black text-slate-800 mb-2">Permainan Selesai!</h2>
                <p className="text-xl text-slate-600 mb-8">
                  Pemenangnya adalah <span className="font-bold text-blue-600 text-3xl block mt-2">{winner?.name}</span>
                </p>

                <div className="flex flex-col sm:flex-row justify-center gap-4">
                  <button
                    onClick={playRematch}
                    className="px-8 py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition-colors shadow-md flex items-center justify-center"
                  >
                    <RotateCcwIcon className="w-5 h-5 mr-2" /> Rematch (Skor {startingScore})
                  </button>
                  <button
                    onClick={resetGame}
                    className="px-8 py-3 bg-slate-200 text-slate-800 font-bold rounded-xl hover:bg-slate-300 transition-colors flex items-center justify-center"
                  >
                    <UsersIcon className="w-5 h-5 mr-2" /> Ganti Pemain
                  </button>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
